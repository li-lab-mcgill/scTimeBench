# this defines the optional datasets that can be used for ontology-based metrics
datasets:
  - name: SuoDataset
    tag: defaultSuoPsupertime
    data_path: ./data/suo/main.h5ad
    requires_caching: true
    data_preprocessing_steps:
      - name: LineageDatasetFilter
        cell_lineage_file: ./cell_lineages/b_cells/b_cell_line.txt
        cell_equivalence_file: ./cell_lineages/b_cells/equal_names.txt
      - name: RoundCellsToTimepoint
        min_cells_per_timepoint: 10
      - name: Psupertime
        preprocess_type: none
      - name: RoundCellsToTimepoint
        num_tps: 15
      - name: LogNormPreprocessor
      - name: CopyTrainTest

  - name: GarciaAlonsoDataset
    tag: defaultGarciaAlonsoPsupertime
    data_path: ./data/garcia-alonso/human_germ.h5ad
    requires_caching: true
    data_preprocessing_steps:
      - name: LineageDatasetFilter
        cell_lineage_file: ./cell_lineages/germ/cell_line.txt
        cell_equivalence_file: ./cell_lineages/germ/equal_names.txt
      - name: RoundCellsToTimepoint
        min_cells_per_timepoint: 10
      - name: Psupertime
        preprocess_type: none
      - name: RoundCellsToTimepoint
        num_tps: 15
      - name: LogNormPreprocessor
      - name: CopyTrainTest

  - name: MaDataset
    tag: defaultMaPsupertime
    data_path: ./data/ma/ma.h5ad
    requires_caching: true
    data_preprocessing_steps:
      - name: LineageDatasetFilter
        cell_lineage_file: ./cell_lineages/pancreas/trunk_lineage.txt
      - name: Psupertime
        preprocess_type: none
      - name: RoundCellsToTimepoint
        num_tps: 10
      - name: LogNormPreprocessor
      - name: CopyTrainTest

  - name: GarciaAlonsoDataset
    tag: defaultGarciaAlonsoSceptic
    data_path: ./data/garcia-alonso/human_germ.h5ad
    requires_caching: true
    data_preprocessing_steps:
      - name: LineageDatasetFilter
        cell_lineage_file: ./cell_lineages/germ/cell_line.txt
        cell_equivalence_file: ./cell_lineages/germ/equal_names.txt
      - name: RoundCellsToTimepoint
        min_cells_per_timepoint: 10
      - name: Sceptic
        preprocess_type: zheng_hvg
      - name: RoundCellsToTimepoint
        num_tps: 15
      - name: LogNormPreprocessor
      - name: CopyTrainTest

  - name: SuoDataset
    tag: defaultSuoSceptic
    data_path: ./data/suo/main.h5ad
    requires_caching: true
    data_preprocessing_steps:
      - name: LineageDatasetFilter
        cell_lineage_file: ./cell_lineages/b_cells/b_cell_line.txt
        cell_equivalence_file: ./cell_lineages/b_cells/equal_names.txt
      - name: RoundCellsToTimepoint
        min_cells_per_timepoint: 10
      - name: Sceptic
        preprocess_type: zheng_hvg
      - name: RoundCellsToTimepoint
        num_tps: 15
      - name: LogNormPreprocessor
      - name: CopyTrainTest

  - name: MaDataset
    tag: defaultMaSceptic
    data_path: ./data/ma/ma.h5ad
    requires_caching: true
    data_preprocessing_steps:
      - name: LineageDatasetFilter
        cell_lineage_file: ./cell_lineages/pancreas/trunk_lineage.txt
      - name: Sceptic
        preprocess_type: zheng_hvg
      - name: RoundCellsToTimepoint
        num_tps: 10
      - name: LogNormPreprocessor
      - name: CopyTrainTest

  - name: GarciaAlonsoDataset
    tag: EasyGarciaAlonso
    data_path: ./data/garcia-alonso/human_germ.h5ad
    # these preprocessors need to be in order!
    data_preprocessing_steps:
      - name: LineageDatasetFilter
        cell_lineage_file: ./cell_lineages/germ/cell_line.txt
        cell_equivalence_file: ./cell_lineages/germ/equal_names.txt
      - name: TestTimepointSelection
        test_tps: [1,3]
        use_time_indices: true
